<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 720" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Frontend box -->
  <rect x="20" y="20" width="800" height="280" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">React Frontend</text>
  <text x="420" y="70" text-anchor="middle" font-size="11" fill="#64748b">Vite + React 19 + TypeScript + Tailwind CSS + MDXEditor</text>

  <!-- Frontend components row 1 -->
  <rect x="45" y="90" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="112" text-anchor="middle" font-weight="600" fill="#1e3a5f">Markdown</text>
  <text x="110" y="128" text-anchor="middle" fill="#475569">Editor</text>

  <rect x="195" y="90" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="260" y="112" text-anchor="middle" font-weight="600" fill="#1e3a5f">Mermaid</text>
  <text x="260" y="128" text-anchor="middle" fill="#475569">Editor</text>

  <rect x="345" y="90" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="410" y="112" text-anchor="middle" font-weight="600" fill="#1e3a5f">Draw.io</text>
  <text x="410" y="128" text-anchor="middle" fill="#475569">Editor</text>

  <rect x="495" y="90" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="112" text-anchor="middle" font-weight="600" fill="#1e3a5f">Image</text>
  <text x="560" y="128" text-anchor="middle" fill="#475569">Editor</text>

  <rect x="645" y="90" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="710" y="112" text-anchor="middle" font-weight="600" fill="#1e3a5f">Video</text>
  <text x="710" y="128" text-anchor="middle" fill="#475569">Player</text>

  <!-- Frontend components row 2 -->
  <rect x="45" y="160" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="110" y="182" text-anchor="middle" font-weight="600" fill="#1e3a5f">Sidebar</text>
  <text x="110" y="198" text-anchor="middle" fill="#475569">File Tree</text>

  <rect x="195" y="160" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="260" y="182" text-anchor="middle" font-weight="600" fill="#1e3a5f">Search</text>
  <text x="260" y="198" text-anchor="middle" fill="#475569">Bar</text>

  <rect x="345" y="160" width="130" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="410" y="182" text-anchor="middle" font-weight="600" fill="#1e3a5f">Draft</text>
  <text x="410" y="198" text-anchor="middle" fill="#475569">System</text>

  <rect x="495" y="160" width="280" height="52" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="635" y="182" text-anchor="middle" font-weight="600" fill="#1e3a5f">AI Assistant</text>
  <text x="635" y="198" text-anchor="middle" fill="#475569">Ask / Generate / Polish</text>

  <!-- Arrow from frontend to backend -->
  <line x1="420" y1="300" x2="420" y2="340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="340" y="305" width="160" height="22" rx="4" fill="#f8fafc"/>
  <text x="420" y="321" text-anchor="middle" font-size="12" fill="#64748b" font-weight="500">REST API (HTTP/JSON)</text>

  <!-- Backend box -->
  <rect x="20" y="345" width="800" height="220" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="375" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">Go Backend Server</text>
  <text x="420" y="395" text-anchor="middle" font-size="11" fill="#64748b">Gin + Fuego REST Framework</text>

  <!-- Backend components row 1 -->
  <rect x="45" y="410" width="160" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="125" y="432" text-anchor="middle" font-weight="600" fill="#14532d">Auth</text>
  <text x="125" y="448" text-anchor="middle" font-size="11" fill="#475569">Google OAuth + JWT</text>

  <rect x="225" y="410" width="160" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="305" y="432" text-anchor="middle" font-weight="600" fill="#14532d">Request Handlers</text>
  <text x="305" y="448" text-anchor="middle" font-size="11" fill="#475569">REST API endpoints</text>

  <rect x="405" y="410" width="160" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="485" y="432" text-anchor="middle" font-weight="600" fill="#14532d">Draft Manager</text>
  <text x="485" y="448" text-anchor="middle" font-size="11" fill="#475569">3-way merge publish</text>

  <rect x="585" y="410" width="210" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="690" y="432" text-anchor="middle" font-weight="600" fill="#14532d">MCP Server</text>
  <text x="690" y="448" text-anchor="middle" font-size="11" fill="#475569">SSE transport + OAuth</text>

  <!-- Backend components row 2 -->
  <rect x="45" y="475" width="160" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="125" y="497" text-anchor="middle" font-weight="600" fill="#14532d">Git Client</text>
  <text x="125" y="513" text-anchor="middle" font-size="11" fill="#475569">Clone, pull, diff, LFS</text>

  <rect x="225" y="475" width="160" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="305" y="497" text-anchor="middle" font-weight="600" fill="#14532d">Search Engine</text>
  <text x="305" y="513" text-anchor="middle" font-size="11" fill="#475569">Hybrid FT + semantic</text>

  <rect x="405" y="475" width="160" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="485" y="497" text-anchor="middle" font-weight="600" fill="#14532d">Permissions</text>
  <text x="485" y="513" text-anchor="middle" font-size="11" fill="#475569">File-level ACL</text>

  <rect x="585" y="475" width="210" height="48" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="690" y="497" text-anchor="middle" font-weight="600" fill="#14532d">AI Integration</text>
  <text x="690" y="513" text-anchor="middle" font-size="11" fill="#475569">Anthropic Claude SDK</text>

  <!-- Arrows to storage -->
  <line x1="180" y1="565" x2="180" y2="620" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="565" x2="560" y2="620" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Storage: Git -->
  <rect x="60" y="625" width="240" height="70" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="655" text-anchor="middle" font-size="15" font-weight="bold" fill="#854d0e">Git Repositories</text>
  <text x="180" y="675" text-anchor="middle" font-size="11" fill="#78716c">On-disk file storage</text>

  <!-- Storage: PostgreSQL -->
  <rect x="420" y="625" width="280" height="70" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="655" text-anchor="middle" font-size="15" font-weight="bold" fill="#9d174d">PostgreSQL + pgvector</text>
  <text x="560" y="675" text-anchor="middle" font-size="11" fill="#78716c">Search index storage</text>
</svg>