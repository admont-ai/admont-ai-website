<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 700" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#22c55e"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ef4444"/></marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Permission Resolution Flow</text>

  <!-- Start -->
  <rect x="260" y="50" width="200" height="40" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#s)" />
  <text x="360" y="75" text-anchor="middle" font-weight="bold" font-size="13" fill="#1e40af">API Request</text>

  <line x1="360" y1="90" x2="360" y2="115" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />

  <!-- Check 1: Read-only repo -->
  <rect x="230" y="120" width="260" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="145" text-anchor="middle" font-weight="600" fill="#92400e">Is repo read-only + write op?</text>

  <line x1="490" y1="140" x2="580" y2="140" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="535" y="135" font-size="11" fill="#ef4444" font-weight="600">Yes</text>
  <rect x="585" y="125" width="110" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" />
  <text x="640" y="145" text-anchor="middle" font-weight="600" fill="#dc2626">403 Blocked</text>

  <line x1="360" y1="160" x2="360" y2="185" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="375" y="178" font-size="11" fill="#22c55e" font-weight="600">No</text>

  <!-- Check 2: System admin -->
  <rect x="230" y="190" width="260" height="40" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="215" text-anchor="middle" font-weight="600" fill="#5b21b6">Is user a system admin?</text>

  <line x1="490" y1="210" x2="580" y2="210" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="535" y="205" font-size="11" fill="#22c55e" font-weight="600">Yes</text>
  <rect x="585" y="195" width="110" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" />
  <text x="640" y="215" text-anchor="middle" font-weight="600" fill="#166534">Full Access</text>

  <line x1="360" y1="230" x2="360" y2="255" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="375" y="248" font-size="11" fill="#ef4444" font-weight="600">No</text>

  <!-- Check 3: Dotfile -->
  <rect x="230" y="260" width="260" height="40" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="285" text-anchor="middle" font-weight="600" fill="#9d174d">Is path a dotfile (.git, etc.)?</text>

  <line x1="490" y1="280" x2="580" y2="280" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="535" y="275" font-size="11" fill="#ef4444" font-weight="600">Yes</text>
  <rect x="585" y="265" width="110" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" />
  <text x="640" y="285" text-anchor="middle" font-weight="600" fill="#dc2626">404 Rejected</text>

  <line x1="360" y1="300" x2="360" y2="325" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="375" y="318" font-size="11" fill="#22c55e" font-weight="600">No</text>

  <!-- Check 4: Permissions file exists -->
  <rect x="210" y="330" width="300" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="355" text-anchor="middle" font-weight="600" fill="#92400e">Does .file-permissions.yaml exist?</text>

  <!-- No permissions file branch -->
  <line x1="210" y1="350" x2="110" y2="350" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="160" y="345" font-size="11" fill="#ef4444" font-weight="600">No</text>

  <rect x="20" y="375" width="180" height="56" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" filter="url(#s)" />
  <text x="110" y="395" text-anchor="middle" font-size="11" fill="#334155">Authenticated → Full access</text>
  <text x="110" y="411" text-anchor="middle" font-size="11" fill="#334155">Anonymous → Read only</text>
  <line x1="110" y1="370" x2="110" y2="375" stroke="#475569" stroke-width="1.5" />

  <!-- Yes permissions file -->
  <line x1="360" y1="370" x2="360" y2="400" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="375" y="390" font-size="11" fill="#22c55e" font-weight="600">Yes</text>

  <!-- Resolver steps -->
  <rect x="230" y="405" width="260" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="425" text-anchor="middle" font-weight="600" fill="#1e40af">Check exact path match</text>
  <text x="360" y="438" text-anchor="middle" font-size="10" fill="#64748b">owner → users → groups → default</text>

  <line x1="490" y1="425" x2="580" y2="425" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="535" y="420" font-size="11" fill="#22c55e" font-weight="600">Match</text>
  <rect x="585" y="410" width="110" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" />
  <text x="640" y="430" text-anchor="middle" font-weight="600" fill="#166534">Use Level</text>

  <line x1="360" y1="445" x2="360" y2="475" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="380" y="465" font-size="11" fill="#ef4444" font-weight="600">None</text>

  <rect x="230" y="480" width="260" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="500" text-anchor="middle" font-weight="600" fill="#1e40af">Walk parent folders</text>
  <text x="360" y="513" text-anchor="middle" font-size="10" fill="#64748b">nearest ancestor first, same checks</text>

  <line x1="490" y1="500" x2="580" y2="500" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="535" y="495" font-size="11" fill="#22c55e" font-weight="600">Match</text>
  <rect x="585" y="485" width="110" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" />
  <text x="640" y="505" text-anchor="middle" font-weight="600" fill="#166534">Use Level</text>

  <line x1="360" y1="520" x2="360" y2="550" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="380" y="540" font-size="11" fill="#ef4444" font-weight="600">None</text>

  <rect x="230" y="555" width="260" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#s)" />
  <text x="360" y="575" text-anchor="middle" font-weight="600" fill="#1e40af">Check root entry default</text>
  <text x="360" y="588" text-anchor="middle" font-size="10" fill="#64748b">owner → users → groups → default</text>

  <line x1="490" y1="575" x2="580" y2="575" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ag)" />
  <text x="535" y="570" font-size="11" fill="#22c55e" font-weight="600">Match</text>
  <rect x="585" y="560" width="110" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" />
  <text x="640" y="580" text-anchor="middle" font-weight="600" fill="#166534">Use Level</text>

  <line x1="360" y1="595" x2="360" y2="625" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)" />
  <text x="380" y="615" font-size="11" fill="#ef4444" font-weight="600">None</text>

  <!-- Final fallback -->
  <rect x="280" y="630" width="160" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#s)" />
  <text x="360" y="655" text-anchor="middle" font-weight="bold" fill="#dc2626">No Access (None)</text>
</svg>