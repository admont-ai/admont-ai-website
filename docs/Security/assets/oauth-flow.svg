<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">OAuth 2.0 Authentication Flow (with PKCE)</text>

  <!-- Actors -->
  <rect x="60" y="50" width="120" height="44" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#s)" />
  <text x="120" y="77" text-anchor="middle" font-weight="bold" font-size="13" fill="#1e40af">Browser</text>

  <rect x="310" y="50" width="120" height="44" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#s)" />
  <text x="370" y="77" text-anchor="middle" font-weight="bold" font-size="13" fill="#166534">Frontend</text>

  <rect x="560" y="50" width="120" height="44" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#s)" />
  <text x="620" y="77" text-anchor="middle" font-weight="bold" font-size="13" fill="#92400e">Backend</text>

  <rect x="770" y="50" width="110" height="44" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2" filter="url(#s)" />
  <text x="825" y="77" text-anchor="middle" font-weight="bold" font-size="13" fill="#9d174d">Google</text>

  <!-- Lifelines -->
  <line x1="120" y1="94" x2="120" y2="650" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4" />
  <line x1="370" y1="94" x2="370" y2="650" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4" />
  <line x1="620" y1="94" x2="620" y2="650" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4" />
  <line x1="825" y1="94" x2="825" y2="650" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4" />

  <!-- Step 1 -->
  <rect x="15" y="118" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="131" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">1</text>
  <line x1="120" y1="127" x2="360" y2="127" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="240" y="122" text-anchor="middle" font-size="11" fill="#334155">Click "Login"</text>

  <!-- Step 2 -->
  <rect x="15" y="148" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">2</text>
  <line x1="370" y1="157" x2="610" y2="157" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="490" y="152" text-anchor="middle" font-size="11" fill="#334155">GET /auth/login?redirect_uri=...</text>

  <!-- Step 3 -->
  <rect x="15" y="178" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="191" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">3</text>
  <rect x="525" y="175" width="190" height="42" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1" />
  <text x="620" y="192" text-anchor="middle" font-size="10" fill="#713f12">Generate state + PKCE verifier</text>
  <text x="620" y="206" text-anchor="middle" font-size="10" fill="#713f12">code_challenge = SHA256(verifier)</text>

  <!-- Step 4 -->
  <rect x="15" y="228" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="241" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">4</text>
  <line x1="610" y1="237" x2="380" y2="237" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="495" y="232" text-anchor="middle" font-size="11" fill="#334155">Return {auth_url: google_url}</text>

  <!-- Step 5 -->
  <rect x="15" y="258" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="271" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">5</text>
  <line x1="370" y1="267" x2="130" y2="267" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="250" y="262" text-anchor="middle" font-size="11" fill="#334155">Redirect to Google</text>

  <!-- Step 6 -->
  <rect x="15" y="288" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="301" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">6</text>
  <line x1="120" y1="297" x2="815" y2="297" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="467" y="292" text-anchor="middle" font-size="11" fill="#334155">Google consent screen (scopes: openid, email, profile)</text>

  <!-- Step 7 -->
  <rect x="15" y="318" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="331" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">7</text>
  <line x1="825" y1="327" x2="130" y2="327" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="477" y="322" text-anchor="middle" font-size="11" fill="#334155">User authenticates &amp; consents</text>

  <!-- Step 8 -->
  <rect x="15" y="348" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="361" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">8</text>
  <line x1="825" y1="357" x2="630" y2="357" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="727" y="352" text-anchor="middle" font-size="11" fill="#334155">Redirect: /auth/callback?code=...&amp;state=...</text>

  <!-- Step 9 -->
  <rect x="15" y="378" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">9</text>
  <line x1="620" y1="387" x2="815" y2="387" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="717" y="382" text-anchor="middle" font-size="11" fill="#334155">Exchange code + PKCE verifier</text>

  <!-- Step 10 -->
  <rect x="15" y="408" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="421" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">10</text>
  <line x1="815" y1="417" x2="630" y2="417" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="722" y="412" text-anchor="middle" font-size="11" fill="#334155">Return Google access + ID token</text>

  <!-- Step 11 -->
  <rect x="15" y="438" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="451" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">11</text>
  <rect x="525" y="435" width="190" height="42" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1" />
  <text x="620" y="452" text-anchor="middle" font-size="10" fill="#713f12">Extract email + name from ID token</text>
  <text x="620" y="466" text-anchor="middle" font-size="10" fill="#713f12">Generate JWT (HS256, 24h expiry)</text>

  <!-- Step 12 -->
  <rect x="15" y="488" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="501" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">12</text>
  <line x1="610" y1="497" x2="130" y2="497" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="370" y="492" text-anchor="middle" font-size="11" fill="#334155">Redirect to frontend_redirect_uri?token=JWT</text>

  <!-- Step 13 -->
  <rect x="15" y="518" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="531" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">13</text>
  <rect x="275" y="515" width="190" height="42" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="1" />
  <text x="370" y="532" text-anchor="middle" font-size="10" fill="#14532d">Extract JWT from URL params</text>
  <text x="370" y="546" text-anchor="middle" font-size="10" fill="#14532d">Store in localStorage</text>

  <!-- Step 14 -->
  <rect x="15" y="568" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="581" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">14</text>
  <line x1="370" y1="577" x2="610" y2="577" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="490" y="572" text-anchor="middle" font-size="11" fill="#334155">API calls with Authorization: Bearer JWT</text>

  <!-- Step 15 -->
  <rect x="15" y="598" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="611" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">15</text>
  <rect x="525" y="595" width="190" height="30" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1" />
  <text x="620" y="614" text-anchor="middle" font-size="10" fill="#713f12">Validate JWT signature + expiry</text>

  <!-- Step 16 -->
  <rect x="15" y="628" width="18" height="18" rx="9" fill="#3b82f6" />
  <text x="24" y="641" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">16</text>
  <line x1="610" y1="637" x2="380" y2="637" stroke="#475569" stroke-width="1.5" marker-end="url(#a)" />
  <text x="495" y="632" text-anchor="middle" font-size="11" fill="#334155">Return response data</text>
</svg>